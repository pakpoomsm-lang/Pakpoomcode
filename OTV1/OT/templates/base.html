<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Attendance · OT · Report | Heat Exchange Indoor{% endblock %}</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

    {% block extra_css %}{% endblock %}
</head>
<body>
    <nav class="navbar navbar-expand-lg app-navbar sticky-top">
        <div class="container-fluid app-shell">
            <a class="navbar-brand" href="/">
                <span class="brand-badge">HEI</span>
                <span class="brand-text">
                    <strong>ATTENDANCE &middot; OVERTIME &middot; REPORT</strong>
                    <small>SMART FACTORY &middot; REAL-TIME</small>
                </span>
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-label="เปิดเมนู">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/' %}active{% endif %}" href="/">
                            <i class="bi bi-pencil-square"></i> บันทึก OT
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/report' %}active{% endif %}" href="/report">
                            <i class="bi bi-file-earmark-spreadsheet"></i> รายงาน
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if request.path == '/employees' %}active{% endif %}" href="/employees">
                            <i class="bi bi-people"></i> พนักงาน
                        </a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container-fluid app-shell app-main">
        {% block content %}{% endblock %}
    </main>

    <footer class="app-footer">
        <div class="container-fluid app-shell">
            <span>Attendance &middot; Overtime &middot; Report &mdash; Heat Exchange Indoor</span>
            <span>2026</span>
        </div>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    {% block extra_js %}{% endblock %}
</body>
</html>
