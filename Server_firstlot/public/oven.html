<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>PROCESS OVEN OIL — FIRST LOT CHECK</title>
<style>
:root {
  --bg: #f0f4f8;
  --col-l: #e8edf5;
  --col-r: #fff8e1;
  --hdr-l: #5d4037;
  --hdr-r: #bf360c;
  --accent: #e65100;
  --ok: #2e7d32;
  --danger: #c62828;
  --border: #b0bec5;
  --text: #212121;
  --text-dim: #607080;
  --mono: 'Consolas','Courier New',monospace;
  --radius: 4px;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  width: 100%; height: 100%;
  overflow: hidden;
  font-family: 'Segoe UI', Arial, sans-serif;
  font-size: 15px;
  background: var(--bg);
  color: var(--text);
  -webkit-user-select: none; user-select: none;
}
input, select, textarea {
  -webkit-user-select: auto !important;
  user-select: auto !important;
}

/* ── TITLE BAR ── */
#titleBar {
  background: var(--hdr-l);
  color: #fff;
  text-align: center;
  font-size: 17px;
  font-weight: 700;
  letter-spacing: 1px;
  padding: 5px 0 4px;
  flex-shrink: 0;
  position: relative;
}
#dataStatus {
  position: absolute; right: 12px; top: 7px;
  font-size: 12px; font-weight: 400; color: #d7ccc8;
}

/* ── LAYOUT ── */
#app { display: flex; flex-direction: column; height: 100vh; }
#cols {
  display: grid;
  grid-template-columns: 42fr 58fr;
  gap: 4px;
  flex: 1;
  overflow: hidden;
  padding: 4px;
}
.col {
  display: flex; flex-direction: column;
  overflow-y: auto; overflow-x: hidden;
  scrollbar-width: thin;
  border-radius: var(--radius);
  padding: 8px;
}
#colLeft  { background: var(--col-l); }
#colRight { background: var(--col-r); }

.col-hdr {
  color: #fff; font-weight: 700; font-size: 14px;
  letter-spacing: .5px; text-align: center;
  padding: 4px 6px; border-radius: var(--radius);
  margin-bottom: 8px; flex-shrink: 0;
}
#colLeft  .col-hdr { background: var(--hdr-l); }
#colRight .col-hdr { background: var(--hdr-r); }

.sec-hdr {
  font-size: 13px; font-weight: 700; color: #fff;
  background: #455a64; padding: 3px 8px; border-radius: 3px;
  margin: 10px 0 6px;
}

/* ── FIELDS ── */
.field { margin-bottom: 7px; }
.field label {
  display: block; font-size: 13px; color: var(--text-dim); margin-bottom: 2px;
}
.req { color: var(--danger); }
.field input, .field select, .field textarea {
  width: 100%; padding: 5px 7px;
  border: 1px solid var(--border); border-radius: var(--radius);
  font-size: 15px; background: #fff; color: var(--text);
}
.field input:focus, .field select:focus, .field textarea:focus {
  outline: 2px solid var(--accent); border-color: var(--accent);
}
.field input[readonly] { background: #eceff1; color: #37474f; font-weight: 600; }
.row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.row3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px; }
.status { font-size: 12px; min-height: 15px; margin-top: 2px; font-weight: 600; }
.mono { font-family: var(--mono); }

/* ── SLOT BUTTONS ── */
.slot-row { display: flex; gap: 8px; }
.slot-btn {
  flex: 1; padding: 8px; border: 2px solid var(--border);
  background: #fff; border-radius: var(--radius); cursor: pointer;
  font-size: 14px; font-weight: 700; color: var(--text-dim); text-align: center;
}
.slot-btn.active {
  background: var(--accent); color: #fff; border-color: var(--accent);
}

/* ── TEMP BADGE ── */
.temp-badge {
  margin-top: 6px; padding: 8px; border-radius: var(--radius);
  text-align: center; font-size: 16px; font-weight: 800; letter-spacing: .5px;
  background: #eceff1; color: #607080;
}
.temp-badge.ok { background: #c8e6c9; color: var(--ok); }
.temp-badge.ng { background: #ffcdd2; color: var(--danger); }

/* ── RESULT BOX ── */
.result-box {
  margin: 10px 0; padding: 10px; border-radius: var(--radius);
  text-align: center; font-size: 20px; font-weight: 800; letter-spacing: 1px;
}
.result-na   { background: #eceff1; color: #607080; }
.result-pass { background: #c8e6c9; color: var(--ok); }
.result-fail { background: #ffcdd2; color: var(--danger); }
@keyframes shake { 0%,100%{transform:translateX(0)} 25%{transform:translateX(-6px)} 75%{transform:translateX(6px)} }

/* ── BUTTONS ── */
.btn {
  padding: 9px 14px; border: none; border-radius: var(--radius);
  font-size: 15px; font-weight: 700; cursor: pointer; color: #fff;
}
.btn-save  { background: var(--ok); }
.btn-reset { background: #78909c; }
.btn-exp   { background: #0277bd; }
.btn-dash  { background: #6a1b9a; }
.btn-sm    { padding: 4px 8px; font-size: 12px; }
.btn-del   { background: var(--danger); }
.btn-row { display: flex; gap: 8px; margin-top: 10px; }
.btn-row .btn { flex: 1; }

/* ── TABLE ── */
.tbl-tools { display: flex; gap: 8px; align-items: center; margin-bottom: 6px; flex-wrap: wrap; }
.tbl-wrap { flex: 1; overflow: auto; border: 1px solid var(--border); border-radius: var(--radius); background: #fff; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
th, td { border: 1px solid #e0e0e0; padding: 3px 6px; text-align: center; white-space: nowrap; }
th { background: var(--hdr-r); color: #fff; position: sticky; top: 0; z-index: 2; }
tr:nth-child(even) td { background: #fafafa; }
.cell-ok { color: var(--ok); font-weight: 700; }
.cell-ng { color: var(--danger); font-weight: 700; }

/* ── TOAST ── */
#toast {
  position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
  background: #263238; color: #fff; padding: 10px 22px; border-radius: 6px;
  font-size: 15px; font-weight: 600; opacity: 0; transition: opacity .3s; z-index: 9999;
  pointer-events: none; box-shadow: 0 4px 16px rgba(0,0,0,.3);
}
</style>
</head>
<body>
<div id="app">
  <div id="titleBar">
    PROCESS OVEN OIL — FIRST LOT CHECK
    <span id="dataStatus">…</span>
  </div>
  <div id="cols">
    <!-- ───────────── LEFT : INPUT ───────────── -->
    <div class="col" id="colLeft">
      <div class="col-hdr">บันทึกข้อมูล / INPUT</div>

      <div class="sec-hdr">ผู้ตรวจ &amp; เครื่อง</div>
      <div class="field">
        <label>Scan ID Card ผู้ตรวจ <span class="req">*</span></label>
        <input id="idCardScan" autocomplete="off"
               oninput="scanWith('idCardScan', lookupIDCard)" placeholder="สแกนบัตรพนักงาน">
        <div class="status" id="idCardStatus"></div>
        <input id="checker" type="hidden"><input id="checkerID" type="hidden">
      </div>
      <div class="field">
        <label>Scan เครื่อง Oven Oil <span class="req">*</span></label>
        <input id="machineScan" autocomplete="off"
               oninput="scanWith('machineScan', lookupMachine)" placeholder="สแกน/พิมพ์ OV15 …">
        <div class="status" id="machineStatus"></div>
        <input id="machine" type="hidden"><input id="machineCode" type="hidden">
      </div>

      <div class="sec-hdr">FG TAG / Item</div>
      <div class="field">
        <label>Scan FG TAG</label>
        <input id="itemFG" autocomplete="off"
               oninput="scanWith('itemFG', updateFromFG)" placeholder="สแกน FG TAG">
        <div class="status" id="fgStatus"></div>
      </div>
      <div class="row3">
        <div class="field"><label>Item FG</label><input id="dispFG" readonly></div>
        <div class="field"><label>Type</label><input id="dispType" readonly></div>
        <div class="field"><label>Lot</label><input id="lot" placeholder="Lot"></div>
      </div>
      <div class="row2">
        <div class="field"><label>Line</label><input id="line" placeholder="Line"></div>
        <div class="field"><label>Seq</label><input id="seq" placeholder="Seq"></div>
      </div>

      <div class="sec-hdr">ช่วงเวลา / SLOT</div>
      <div class="row2">
        <div class="field">
          <label>กะ / Shift</label>
          <input id="shift" readonly>
        </div>
        <div class="field">
          <label>Slot <span class="req">*</span></label>
          <div class="slot-row">
            <div class="slot-btn" id="slotBtn1" onclick="setSlot('1')">Slot 1</div>
            <div class="slot-btn" id="slotBtn2" onclick="setSlot('2')">Slot 2</div>
          </div>
          <input id="slot" type="hidden">
        </div>
      </div>

      <div class="sec-hdr">ตรวจอุณหภูมิ / TEMP SENSOR</div>
      <div class="row3">
        <div class="field">
          <label>Set Temp (°C) <span class="req">*</span></label>
          <input id="setTemp" type="number" step="0.1" inputmode="decimal"
                 oninput="calcTemp()" placeholder="เช่น 180">
        </div>
        <div class="field">
          <label>Tol ± (°C)</label>
          <input id="tol" type="number" step="0.1" inputmode="decimal" value="5" oninput="calcTemp()">
        </div>
        <div class="field">
          <label>Actual (°C) <span class="req">*</span></label>
          <input id="actualTemp" type="number" step="0.1" inputmode="decimal"
                 oninput="calcTemp()" placeholder="วัดจริง">
        </div>
      </div>
      <div class="temp-badge" id="tempBadge">— รอกรอกอุณหภูมิ —</div>

      <div class="sec-hdr">ยืนยัน / CONFIRM</div>
      <div class="field">
        <label>Scan ID Confirm Checker <span class="req">*</span></label>
        <input id="confirmCheckerScan" autocomplete="off"
               oninput="scanWith('confirmCheckerScan', lookupConfirmChecker)" placeholder="สแกนหัวหน้า/ผู้ยืนยัน">
        <div class="status" id="confirmCheckerStatus"></div>
        <input id="confirmChecker" type="hidden">
      </div>
      <div class="field">
        <label>หมายเหตุ / Remark</label>
        <textarea id="remark" rows="2" placeholder="(ถ้ามี)"></textarea>
      </div>

      <div class="result-box result-na" id="statusOverall">— รอตรวจ —</div>
      <div class="btn-row">
        <button class="btn btn-save"  onclick="saveRecord()">💾 บันทึก (Save)</button>
        <button class="btn btn-reset" onclick="resetForm()">↺ Reset</button>
      </div>
    </div>

    <!-- ───────────── RIGHT : RECORDS ───────────── -->
    <div class="col" id="colRight">
      <div class="col-hdr">รายการที่บันทึก / RECORDS</div>
      <div class="tbl-tools">
        <button class="btn btn-exp btn-sm"  onclick="exportExcel()">⬇ Export Excel</button>
        <button class="btn btn-dash btn-sm" onclick="openSharedDashboard()">📊 Dashboard</button>
        <button class="btn btn-reset btn-sm" onclick="loadRecords()">↻ Refresh</button>
        <span id="recCount" style="font-size:13px;color:var(--text-dim);font-weight:600"></span>
      </div>
      <div class="tbl-wrap">
        <table id="recTable">
          <thead><tr>
            <th>#</th><th>วันที่</th><th>เวลา</th><th>กะ</th><th>Slot</th>
            <th>เครื่อง</th><th>Item FG</th><th>Line</th><th>Seq</th>
            <th>Set</th><th>Act</th><th>Temp</th><th>ผู้ตรวจ</th><th>Status</th><th></th>
          </tr></thead>
          <tbody id="recBody"></tbody>
        </table>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// DATA
// ═══════════════════════════════════════════════════════
let EMPLOYEES = {}, MACHINES = {}, CHECKERS = {}, masterData = {};

// ── Scan debounce / lock (same convention as Expander) ──
const _scanTimer = {}, _scanLockUntil = {};
const SCAN_SETTLE = 150, SCAN_LOCK_MS = 4000;
function scanWith(fieldId, fn) {
  clearTimeout(_scanTimer[fieldId]);
  _scanTimer[fieldId] = setTimeout(() => {
    const now = Date.now();
    if (_scanLockUntil[fieldId] && now < _scanLockUntil[fieldId]) {
      const el = document.getElementById(fieldId);
      if (el) { const was = el.style.outline; el.style.outline = '2px solid #e53935';
        setTimeout(() => { el.style.outline = was; }, 500); }
      return;
    }
    fn();
    _scanLockUntil[fieldId] = Date.now() + SCAN_LOCK_MS;
  }, SCAN_SETTLE);
}
function clearScanLocks() {
  Object.keys(_scanTimer).forEach(k => clearTimeout(_scanTimer[k]));
  Object.keys(_scanLockUntil).forEach(k => delete _scanLockUntil[k]);
}

async function loadData() {
  try {
    const [emp, mch, chk, itm] = await Promise.all([
      fetch('/oven/data/employees.json').then(r => r.json()),
      fetch('/oven/data/machines.json').then(r => r.json()),
      fetch('/oven/data/checkers.json').then(r => r.json()),
      fetch('/oven/data/items.json').then(r => r.json()),
    ]);
    EMPLOYEES = emp; MACHINES = mch; CHECKERS = chk;
    Object.entries(itm).forEach(([fg, d]) => {
      masterData[fg.toUpperCase()] = { type: d.type || '', desc: d.desc || '' };
    });
    const st = document.getElementById('dataStatus');
    st.textContent = '✓ ' + Object.keys(EMPLOYEES).length + ' emp | '
      + Object.keys(masterData).length + ' items | ' + Object.keys(MACHINES).length + ' MC';
  } catch(e) {
    document.getElementById('dataStatus').textContent = '✗ โหลดข้อมูลไม่สำเร็จ';
    console.warn('loadData failed', e);
  }
}
loadData();

// ═══════════════════════════════════════════════════════
// RESOLVERS (5-char barcode prefix → identity)
// ═══════════════════════════════════════════════════════
function fgFromRaw(raw) {
  const r = raw.trim();
  if (r.length >= 75) return r.substring(64, 75).trim().toUpperCase();
  return r.toUpperCase();
}
function resolveEmployee(raw) {
  const r = raw.trim(); if (!r) return null;
  if (r.length >= 10) { const id = r.substring(5, 10); if (EMPLOYEES[id]) return { id, name: EMPLOYEES[id] }; }
  const tail = r.slice(-5); if (EMPLOYEES[tail]) return { id: tail, name: EMPLOYEES[tail] };
  if (EMPLOYEES[r]) return { id: r, name: EMPLOYEES[r] };
  return null;
}
function resolveMachine(raw) {
  const r = raw.trim(); if (!r) return null;
  if (r.length >= 9) { const code = r.substring(5, 9); if (MACHINES[code]) return { code, name: MACHINES[code] }; }
  const tail4 = r.slice(-4); if (MACHINES[tail4]) return { code: tail4, name: MACHINES[tail4] };
  if (MACHINES[r.toUpperCase()]) return { code: r.toUpperCase(), name: MACHINES[r.toUpperCase()] };
  return null;
}

function lookupIDCard() {
  const raw = document.getElementById('idCardScan').value;
  const stEl = document.getElementById('idCardStatus');
  if (!raw.trim()) { stEl.textContent = ''; return; }
  const res = resolveEmployee(raw);
  if (res) {
    document.getElementById('checker').value = res.name;
    document.getElementById('checkerID').value = res.id;
    stEl.style.color = 'var(--ok)'; stEl.textContent = '✓ ' + res.name;
  } else {
    document.getElementById('checker').value = ''; document.getElementById('checkerID').value = '';
    stEl.style.color = 'var(--danger)'; stEl.textContent = '✗ ไม่พบรหัส';
  }
  calcOverall();
}

function lookupMachine() {
  const raw = document.getElementById('machineScan').value;
  const stEl = document.getElementById('machineStatus');
  if (!raw.trim()) { stEl.textContent = ''; return; }
  const res = resolveMachine(raw);
  if (res) {
    document.getElementById('machine').value = res.name;
    document.getElementById('machineCode').value = res.code;
    const isOven = /oven|dry/i.test(res.name) || /^OV|^DRY/i.test(res.code);
    stEl.style.color = isOven ? 'var(--ok)' : '#ef6c00';
    stEl.textContent = (isOven ? '✓ ' : '⚠ ไม่ใช่ Oven? ') + res.code + ' — ' + res.name;
  } else {
    document.getElementById('machine').value = ''; document.getElementById('machineCode').value = '';
    stEl.style.color = 'var(--danger)'; stEl.textContent = '✗ ไม่พบเครื่อง [' + raw.trim() + ']';
  }
  calcOverall();
}

// FG TAG → item + line/seq/lot (same barcode offsets as Expander)
function updateFromFG() {
  const raw = document.getElementById('itemFG').value.trim();
  const stEl = document.getElementById('fgStatus');
  const v = fgFromRaw(raw);
  document.getElementById('dispFG').value = v;
  if (raw.length >= 121) {
    const line = raw.substring(115, 117).trim();
    const seq  = raw.substring(117, 121).trim().replace(/^0+/, '') || '0';
    if (line) document.getElementById('line').value = line;
    if (seq)  document.getElementById('seq').value = seq;
  }
  if (raw.length >= 172) {
    const lot = raw.substring(166, 172).trim().replace(/^0+/, '') || '';
    if (lot) document.getElementById('lot').value = lot;
  }
  const m = masterData[v];
  if (m) {
    document.getElementById('dispType').value = m.type;
    stEl.style.color = 'var(--ok)'; stEl.textContent = '✓ ' + (m.type || v) + (m.desc ? ' — ' + m.desc : '');
  } else if (v) {
    document.getElementById('dispType').value = '';
    stEl.style.color = '#ef6c00'; stEl.textContent = 'ℹ ไม่พบใน master (' + v + ')';
  }
}

function lookupConfirmChecker() {
  const raw = document.getElementById('confirmCheckerScan').value;
  const stEl = document.getElementById('confirmCheckerStatus');
  if (!raw.trim()) { stEl.textContent = ''; document.getElementById('confirmChecker').value = ''; calcOverall(); return; }
  const id = raw.trim().substring(5, 10);
  const entry = CHECKERS[id] || CHECKERS[raw.trim().slice(-5)];
  if (entry) {
    document.getElementById('confirmChecker').value = entry.name || entry;
    stEl.style.color = 'var(--ok)';
    stEl.textContent = '✓ ' + (entry.name || entry) + (entry.role ? ' (' + entry.role + ')' : '');
  } else {
    document.getElementById('confirmChecker').value = '';
    stEl.style.color = 'var(--danger)'; stEl.textContent = '✗ ไม่พบ [' + id + ']';
  }
  calcOverall();
}

// ═══════════════════════════════════════════════════════
// SHIFT / SLOT
// ═══════════════════════════════════════════════════════
function currentShift() {
  const now = new Date(); const t = now.getHours() * 60 + now.getMinutes();
  return (t >= (7*60+40) && t < (19*60+40)) ? 'day' : 'night';
}
function suggestSlot() {
  // Day: slot1 07:40–13:00, slot2 13:00–19:40 | Night: slot1 19:40–01:40, slot2 01:40–07:40
  const now = new Date(); const t = now.getHours() * 60 + now.getMinutes();
  if (currentShift() === 'day') return (t < 13*60) ? '1' : '2';
  return (t >= (19*60+40) || t < (1*60+40)) ? '1' : '2';
}
function setSlot(s) {
  document.getElementById('slot').value = s;
  document.getElementById('slotBtn1').classList.toggle('active', s === '1');
  document.getElementById('slotBtn2').classList.toggle('active', s === '2');
  calcOverall();
}
function refreshShift() { document.getElementById('shift').value = (currentShift() === 'day' ? 'กลางวัน (Day)' : 'กลางคืน (Night)'); }

// ═══════════════════════════════════════════════════════
// TEMP JUDGE
// ═══════════════════════════════════════════════════════
function tempResult() {
  const set = parseFloat(g('setTemp')), tol = parseFloat(g('tol')) || 0, act = parseFloat(g('actualTemp'));
  if (isNaN(set) || isNaN(act)) return { ok: null, diff: null };
  const diff = Math.round((act - set) * 10) / 10;
  return { ok: Math.abs(diff) <= tol, diff };
}
function calcTemp() {
  const r = tempResult(); const b = document.getElementById('tempBadge');
  if (r.ok === null) { b.className = 'temp-badge'; b.textContent = '— รอกรอกอุณหภูมิ —'; }
  else if (r.ok)     { b.className = 'temp-badge ok'; b.textContent = 'OK  (Δ ' + r.diff + '°C)'; }
  else               { b.className = 'temp-badge ng'; b.textContent = 'NG  (Δ ' + r.diff + '°C)'; }
  calcOverall();
}

// ═══════════════════════════════════════════════════════
// OVERALL STATUS
// ═══════════════════════════════════════════════════════
function calcOverall() {
  const el = document.getElementById('statusOverall');
  const haveBasics = g('checkerID') && g('machineCode') && g('slot');
  const r = tempResult();
  if (!haveBasics || r.ok === null) { el.className = 'result-box result-na'; el.textContent = '— รอตรวจ —'; return; }
  if (r.ok) { el.className = 'result-box result-pass'; el.textContent = '✓ PASS'; }
  else      { el.className = 'result-box result-fail'; el.textContent = '✗ FAIL (อุณหภูมิเกิน spec)'; }
}

function g(id) { return (document.getElementById(id) || {}).value || ''; }

// ═══════════════════════════════════════════════════════
// SAVE
// ═══════════════════════════════════════════════════════
function saveRecord() {
  if (!g('checkerID'))      { showToast('❌ กรุณา Scan ID Card ก่อน'); return; }
  if (!g('machineCode'))    { showToast('❌ กรุณา Scan เครื่อง Oven'); return; }
  if (!g('slot'))           { showToast('❌ กรุณาเลือก Slot'); return; }
  const r = tempResult();
  if (r.ok === null)        { showToast('❌ กรุณากรอก Set / Actual Temp'); return; }
  if (!g('confirmChecker').trim()) { showToast('❌ กรุณา Scan ID Confirm Checker'); return; }

  const statusEl  = document.getElementById('statusOverall');
  const statusTxt = statusEl.textContent.trim();
  if (!statusTxt.includes('PASS')) {
    showToast('❌ บันทึกไม่ได้ — ' + statusTxt);
    statusEl.style.animation = 'none';
    setTimeout(() => { statusEl.style.animation = 'shake .3s'; }, 10);
    return;
  }

  const now = new Date();
  const _ry = now.getFullYear(), _rm = String(now.getMonth()+1).padStart(2,'0'), _rd = String(now.getDate()).padStart(2,'0');
  const _dateStr = (_ry >= 2500 ? _ry - 543 : _ry) + '-' + _rm + '-' + _rd;
  const rec = {
    date: _dateStr, time: now.toLocaleTimeString('th-TH'),
    shift: currentShift(), slot: g('slot'),
    checker: g('checker'), checkerID: g('checkerID'), confirmChecker: g('confirmChecker'),
    machine: g('machineCode') + ' — ' + g('machine'), machineCode: g('machineCode'),
    line: g('line'), seq: g('seq'), lot: g('lot'),
    itemFG: fgFromRaw(g('itemFG')), type: g('dispType'),
    setTemp: g('setTemp'), tol: g('tol'), actualTemp: g('actualTemp'),
    tempDiff: (r.diff === null ? '' : String(r.diff)),
    tempResult: r.ok ? 'OK' : 'NG',
    remark: g('remark'), status: r.ok ? 'PASS' : 'FAIL',
  };

  fetch('/oven/api/record', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify(rec) })
    .then(r => r.json())
    .then(d => { showToast(d.ok ? '✓ บันทึกแล้ว #' + d.id : 'Error: ' + d.error); if (d.ok) { _notifyDashboard(); loadRecords(); } })
    .catch(() => showToast('บันทึก (offline) แล้ว'));

  resetForm();
}

function resetForm() {
  ['idCardScan','checker','checkerID','machineScan','machine','machineCode',
   'itemFG','dispFG','dispType','line','seq','lot',
   'setTemp','actualTemp','confirmCheckerScan','confirmChecker','remark']
    .forEach(id => { const el = document.getElementById(id); if (el) el.value = ''; });
  document.getElementById('tol').value = '5';
  ['idCardStatus','machineStatus','fgStatus','confirmCheckerStatus']
    .forEach(id => { const el = document.getElementById(id); if (el) el.textContent = ''; });
  clearScanLocks();
  document.getElementById('slot').value = '';
  document.getElementById('slotBtn1').classList.remove('active');
  document.getElementById('slotBtn2').classList.remove('active');
  refreshShift();
  setSlot(suggestSlot());
  calcTemp();
  document.getElementById('idCardScan').focus();
}

// ═══════════════════════════════════════════════════════
// RECORDS TABLE
// ═══════════════════════════════════════════════════════
function esc(s) { return String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
async function loadRecords() {
  try {
    const rows = await fetch('/oven/api/records').then(r => r.json());
    const tb = document.getElementById('recBody');
    tb.innerHTML = '';
    rows.forEach((r, i) => {
      const tr = document.createElement('tr');
      const tcls = r.temp_result === 'OK' ? 'cell-ok' : (r.temp_result === 'NG' ? 'cell-ng' : '');
      const scls = (r.status || '').includes('PASS') ? 'cell-ok' : 'cell-ng';
      tr.innerHTML =
        '<td>' + (i + 1) + '</td>' +
        '<td>' + esc(r.date) + '</td>' + '<td>' + esc(r.time) + '</td>' +
        '<td>' + (r.shift === 'night' ? 'N' : 'D') + '</td>' +
        '<td>' + esc(r.slot) + '</td>' +
        '<td>' + esc(r.machine_code || r.machine) + '</td>' +
        '<td>' + esc(r.item_fg) + '</td>' +
        '<td>' + esc(r.line) + '</td>' + '<td>' + esc(r.seq) + '</td>' +
        '<td>' + esc(r.set_temp) + '</td>' + '<td>' + esc(r.actual_temp) + '</td>' +
        '<td class="' + tcls + '">' + esc(r.temp_result) + '</td>' +
        '<td>' + esc(r.checker_id) + '</td>' +
        '<td class="' + scls + '">' + esc(r.status) + '</td>' +
        '<td><button class="btn btn-del btn-sm" onclick="delRecord(' + r.id + ')">✕</button></td>';
      tb.appendChild(tr);
    });
    document.getElementById('recCount').textContent = rows.length + ' รายการ';
  } catch(e) { console.warn('loadRecords failed', e); }
}
function delRecord(id) {
  if (!confirm('ลบรายการ #' + id + ' ?')) return;
  fetch('/oven/api/record/' + id, { method:'DELETE' })
    .then(r => r.json()).then(d => { showToast(d.ok ? 'ลบแล้ว' : 'Error'); loadRecords(); _notifyDashboard(); });
}
function exportExcel() {
  fetch('/oven/api/export').then(r => r.json())
    .then(d => showToast(d.ok ? '✓ Export: ' + d.rows + ' แถว → ' + d.file : 'Error: ' + d.error))
    .catch(() => showToast('Export failed'));
}

// ═══════════════════════════════════════════════════════
// DASHBOARD
// ═══════════════════════════════════════════════════════
const _DASH_URL = 'http://10.235.117.215:3001/dashboard/firstlot', _DASH_WIN = 'shared_dashboard';
function openSharedDashboard() {
  const w = window.open('', _DASH_WIN);
  if (w && !w.closed) { try { if (w.location.href && w.location.href !== 'about:blank') { w.focus(); return; } } catch(e) {} }
  window.open(_DASH_URL, _DASH_WIN);
}
function _notifyDashboard() {
  try { const bc = new BroadcastChannel('dash_refresh'); bc.postMessage(1); bc.close(); } catch(e) {}
  try { localStorage.setItem('dash_refresh', Date.now()); } catch(e) {}
}
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.opacity = '1';
  setTimeout(() => { t.style.opacity = '0'; }, 3000);
}

// ── init ──
refreshShift();
setSlot(suggestSlot());
setInterval(refreshShift, 30000);
loadRecords();
document.getElementById('idCardScan').focus();
</script>
